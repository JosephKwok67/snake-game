<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a12;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            overflow: hidden;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 2rem;
            text-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff;
            letter-spacing: 4px;
        }
        #scoreBoard {
            margin-bottom: 10px;
            font-size: 1.2rem;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        #modeIndicator {
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 12px;
            background: rgba(255, 0, 255, 0.15);
            color: #ff00ff;
            border: 1px solid rgba(255, 0, 255, 0.4);
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
        }
        #modeIndicator:hover {
            background: rgba(255, 0, 255, 0.3);
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.4);
        }
        canvas {
            border: 3px solid #333;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3), inset 0 0 30px rgba(255, 0, 255, 0.1);
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a12 100%);
            max-width: 95vw;
            max-height: 65vh;
            width: auto;
            height: auto;
            touch-action: none;
        }
        #info {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #888;
            text-align: center;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 30px 50px;
            border-radius: 15px;
            border: 2px solid #ff00ff;
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.5);
            text-align: center;
            display: none;
        }
        #gameOver h2 {
            color: #ff00ff;
            margin-bottom: 15px;
            text-shadow: 0 0 15px #ff00ff;
        }
        #gameOver p {
            margin-bottom: 20px;
            font-size: 1.1rem;
        }
        button {
            padding: 10px 25px;
            font-size: 1rem;
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            border: none;
            border-radius: 25px;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.6);
        }
        #leaderboard {
            margin: 15px 0;
            text-align: left;
            min-width: 220px;
        }
        #leaderboard h3 {
            text-align: center;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
            margin-bottom: 10px;
            font-size: 1rem;
        }
        #leaderboard ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        #leaderboard li {
            padding: 5px 10px;
            border-radius: 5px;
            margin-bottom: 4px;
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
        }
        #leaderboard li.rank-1 {
            background: rgba(255, 215, 0, 0.15);
            color: #ffd700;
            text-shadow: 0 0 8px #ffd700;
        }
        #leaderboard li.rank-2 {
            background: rgba(192, 192, 192, 0.15);
            color: #c0c0c0;
        }
        #leaderboard li.rank-3 {
            background: rgba(205, 127, 50, 0.15);
            color: #cd7f32;
        }
        #leaderboard li.current {
            outline: 1px solid #ff00ff;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.4);
        }
        #recordNotice {
            color: #ffd700;
            font-size: 1.3rem;
            font-weight: bold;
            text-shadow: 0 0 15px #ffd700;
            margin-bottom: 10px;
            display: none;
        }
        #startMenu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px 50px;
            border-radius: 20px;
            border: 2px solid #00ffff;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.4);
            text-align: center;
            z-index: 10;
        }
        #startMenu h2 {
            color: #00ffff;
            margin-bottom: 25px;
            text-shadow: 0 0 15px #00ffff;
        }
        .mode-btn {
            display: block;
            width: 260px;
            margin: 15px auto;
            padding: 18px 20px;
            font-size: 1.2rem;
            background: linear-gradient(135deg, rgba(255,0,255,0.2), rgba(0,255,255,0.2));
            border: 2px solid #333;
            border-radius: 15px;
            color: #fff;
            cursor: pointer;
            transition: all 0.25s;
            text-align: left;
        }
        .mode-btn:hover {
            border-color: #ff00ff;
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.5);
            transform: translateY(-2px);
        }
        .mode-btn small {
            display: block;
            margin-top: 6px;
            font-size: 0.8rem;
            color: #aaa;
            font-weight: normal;
        }
        #levelSelect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.92);
            padding: 35px 45px;
            border-radius: 20px;
            border: 2px solid #ff00ff;
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.4);
            text-align: center;
            z-index: 11;
            display: none;
            min-width: 320px;
        }
        #levelSelect h2 {
            color: #ff00ff;
            margin-bottom: 20px;
            text-shadow: 0 0 15px #ff00ff;
        }
        #levelGrid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            max-width: 350px;
            margin: 0 auto;
        }
        .level-btn {
            aspect-ratio: 1;
            border: 2px solid #333;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(0,255,255,0.15), rgba(255,0,255,0.15));
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .level-btn:hover:not(.locked) {
            border-color: #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            transform: scale(1.05);
        }
        .level-btn.locked {
            background: #222;
            color: #666;
            cursor: not-allowed;
            border-color: #333;
        }
        .level-btn.completed {
            border-color: #ffd700;
            color: #ffd700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }
    </style>
</head>
<body>
    <h1>🐍 霓虹贪吃蛇</h1>
    <div id="scoreBoard">
        <span id="scoreLabel">得分:</span> <span id="score">0</span> | 最高分: <span id="highScore">0</span>
        <span id="modeIndicator" title="点击切换控制模式">检测中...</span>
    </div>

    <div id="startMenu">
        <h2>选择游戏模式</h2>
        <button class="mode-btn" onclick="selectMode('endless')">
            ♾️ 无尽模式
            <small>一条命，挑战最高分</small>
        </button>
        <button class="mode-btn" onclick="showLevelSelect()">
            🏰 闯关模式
            <small>选择关卡，障碍逐渐变多</small>
        </button>
    </div>

    <div id="levelSelect">
        <h2>选择关卡</h2>
        <div id="levelGrid"></div>
        <button onclick="backToMenu()" style="margin-top: 15px; background: linear-gradient(135deg, #444, #666);">返回主菜单</button>
    </div>

    <canvas id="gameCanvas" width="600" height="600"></canvas>
    <div id="info">键盘：方向键 / WASD 移动 | 手机：在画布上滑动控制 | 空格暂停 | R 复活</div>

    <div id="gameOver">
        <h2>游戏结束</h2>
        <div id="recordNotice">🏆 新纪录！</div>
        <p>最终得分: <span id="finalScore">0</span></p>
        <div id="leaderboard">
            <h3>🏅 排行榜 TOP 5</h3>
            <ul id="leaderboardList"></ul>
        </div>
        <button onclick="restartGame()">重新开始</button>
        <button onclick="backToMenu()" style="margin-top: 10px; background: linear-gradient(135deg, #444, #666);">返回主菜单</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const scoreLabelEl = document.getElementById('scoreLabel');
        const highScoreEl = document.getElementById('highScore');
        const finalScoreEl = document.getElementById('finalScore');
        const gameOverEl = document.getElementById('gameOver');
        const leaderboardListEl = document.getElementById('leaderboardList');
        const recordNoticeEl = document.getElementById('recordNotice');
        const modeIndicatorEl = document.getElementById('modeIndicator');
        const startMenuEl = document.getElementById('startMenu');
        const levelSelectEl = document.getElementById('levelSelect');
        const levelGridEl = document.getElementById('levelGrid');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        const highScore = localStorage.getItem('snakeHighScore') || 0;
        highScoreEl.textContent = highScore;

        let snake = [];
        let foods = [];
        let dx = gridSize;
        let dy = 0;
        let nextDx = gridSize;
        let nextDy = 0;
        let score = 0;
        let gameRunning = false;
        let gamePaused = false;
        let particles = [];
        let hue = 0;
        let foodPulse = 0;

        // 游戏模式
        let gameMode = null; // 'endless' 或 'level'
        let startMenuLevel = 1;
        let level = 1;
        let levelTarget = 0;
        let levelEaten = 0;
        let obstacles = [];
        let gameLoopId = null;

        // 控制模式：'auto' 由程序根据设备判断，'keyboard' 强制键盘，'touch' 强制触屏
        let controlMode = 'auto';
        let detectedTouch = false;
        let touchStartX = 0;
        let touchStartY = 0;
        let touchStartTime = 0;
        const SWIPE_THRESHOLD = 30;

        function isTouchDevice() {
            return window.matchMedia('(pointer: coarse)').matches ||
                   'ontouchstart' in window ||
                   navigator.maxTouchPoints > 0;
        }

        function getEffectiveMode() {
            if (controlMode !== 'auto') return controlMode;
            return detectedTouch ? 'touch' : 'keyboard';
        }

        function updateModeIndicator() {
            const mode = getEffectiveMode();
            modeIndicatorEl.textContent = mode === 'touch' ? '触屏模式' : '键盘模式';
            modeIndicatorEl.title = '点击切换：自动 / 键盘 / 触屏';
        }

        function cycleControlMode() {
            if (controlMode === 'auto') controlMode = 'keyboard';
            else if (controlMode === 'keyboard') controlMode = 'touch';
            else controlMode = 'auto';
            updateModeIndicator();
        }

        detectedTouch = isTouchDevice();
        updateModeIndicator();
        modeIndicatorEl.addEventListener('click', cycleControlMode);

        function handleSwipe(deltaX, deltaY) {
            if (!gameRunning || gamePaused) return;
            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                // 水平滑动：当前必须没有水平移动（防止掉头）
                if (Math.abs(deltaX) >= SWIPE_THRESHOLD && dx === 0) {
                    if (deltaX > 0) { nextDx = gridSize; nextDy = 0; }
                    else { nextDx = -gridSize; nextDy = 0; }
                }
            } else {
                // 垂直滑动：当前必须没有垂直移动（防止掉头）
                if (Math.abs(deltaY) >= SWIPE_THRESHOLD && dy === 0) {
                    if (deltaY > 0) { nextDx = 0; nextDy = gridSize; }
                    else { nextDx = 0; nextDy = -gridSize; }
                }
            }
        }

        // Web Audio API 音效
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playTone(freq, type, duration, fade = true) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            if (fade) {
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            } else {
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            }
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playEatSound() {
            if (!audioCtx) return;
            // 分数越高，音效越激进：音高更高、音符更短、波形更尖锐
            const level = Math.min(Math.floor(score / 50), 10);
            const baseFreq = 440 + score * 3 + level * 80;
            const duration = Math.max(0.05, 0.15 - level * 0.008);
            const waveType = level >= 5 ? 'sawtooth' : 'square';
            const gap = Math.max(25, 55 - level * 3);

            playTone(baseFreq, waveType, duration);
            setTimeout(() => playTone(baseFreq * 1.25, waveType, duration), gap);
            setTimeout(() => playTone(baseFreq * 1.5, waveType, duration * 1.2), gap * 2);

            // 高分后增加额外装饰音
            if (level >= 3) {
                setTimeout(() => playTone(baseFreq * 2, 'sawtooth', duration * 0.8), gap * 3);
            }
        }

        function playGameOverSound() {
            if (!audioCtx) return;
            playTone(220, 'sawtooth', 0.3);
            setTimeout(() => playTone(165, 'sawtooth', 0.4), 150);
            setTimeout(() => playTone(110, 'sawtooth', 0.6), 350);
        }

        function playRespawnSound() {
            if (!audioCtx) return;
            playTone(523, 'sine', 0.1);
            setTimeout(() => playTone(659, 'sine', 0.1), 80);
            setTimeout(() => playTone(784, 'sine', 0.15), 160);
        }

        // 欢快激昂的背景音乐
        let musicPlaying = false;
        let musicTimer = null;
        let musicBeat = 0;
        const musicTempo = 0.18; // 约 166 BPM
        const musicNotes = [
            // 主旋律 (C 大调，欢快)
            [523.25, 659.25, 783.99, 659.25, 880.00, 783.99, 659.25, 523.25],
            [587.33, 698.46, 880.00, 698.46, 783.99, 659.25, 523.25, 392.00]
        ];
        const musicBass = [
            [130.81, 130.81, 196.00, 196.00, 220.00, 220.00, 174.61, 174.61],
            [130.81, 130.81, 196.00, 196.00, 220.00, 220.00, 174.61, 174.61]
        ];

        function playMusicNote(freq, time, duration, type = 'square') {
            if (!audioCtx || !musicPlaying) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, time);
            gain.gain.setValueAtTime(0.06, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(time);
            osc.stop(time + duration);
        }

        function scheduleMusic() {
            if (!audioCtx || !musicPlaying) return;
            const lookahead = 0.5;
            let nextTime = audioCtx.currentTime;
            // 这里只是启动定时器，实际音符由 scheduler tick 安排
        }

        function musicTick() {
            if (!audioCtx || !musicPlaying) return;
            const now = audioCtx.currentTime;
            const beatDuration = musicTempo;
            // 使用静态变量保存下一次音符时间
            if (!musicTick.nextNoteTime) musicTick.nextNoteTime = now;

            while (musicTick.nextNoteTime < now + 0.3) {
                const bar = Math.floor(musicBeat / 8) % 2;
                const step = musicBeat % 8;
                const melodyFreq = musicNotes[bar][step];
                const bassFreq = musicBass[bar][step];

                if (melodyFreq) {
                    playMusicNote(melodyFreq, musicTick.nextNoteTime, beatDuration * 0.9, 'square');
                }
                if (bassFreq) {
                    playMusicNote(bassFreq, musicTick.nextNoteTime, beatDuration * 0.95, 'sawtooth');
                }

                musicBeat++;
                musicTick.nextNoteTime += beatDuration;
            }
        }

        function startMusic() {
            initAudio();
            if (musicPlaying) return;
            musicPlaying = true;
            musicBeat = 0;
            musicTick.nextNoteTime = null;
            if (musicTimer) clearInterval(musicTimer);
            musicTimer = setInterval(musicTick, 60);
        }

        function stopMusic() {
            musicPlaying = false;
            if (musicTimer) {
                clearInterval(musicTimer);
                musicTimer = null;
            }
        }

        function loadLeaderboard() {
            try {
                return JSON.parse(localStorage.getItem('snakeLeaderboard')) || [];
            } catch {
                return [];
            }
        }

        function saveLeaderboard(board) {
            localStorage.setItem('snakeLeaderboard', JSON.stringify(board));
        }

        function addScoreToLeaderboard(newScore) {
            const board = loadLeaderboard();
            const entry = {
                score: newScore,
                date: new Date().toLocaleString('zh-CN', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' })
            };
            board.push(entry);
            board.sort((a, b) => b.score - a.score);
            const trimmed = board.slice(0, 5);
            saveLeaderboard(trimmed);
            return trimmed;
        }

        function isNewRecord(newScore) {
            const board = loadLeaderboard();
            return board.length === 0 || newScore > board[0].score;
        }

        function getCurrentRank(newScore, board) {
            return board.findIndex(entry => entry.score === newScore);
        }

        function renderLeaderboard(board, currentScore = null) {
            leaderboardListEl.innerHTML = '';
            board.forEach((entry, index) => {
                const li = document.createElement('li');
                li.className = `rank-${index + 1}`;
                if (currentScore !== null && entry.score === currentScore) {
                    li.classList.add('current');
                }
                li.innerHTML = `<span>#${index + 1}  ${entry.score} 分</span><span>${entry.date}</span>`;
                leaderboardListEl.appendChild(li);
            });
        }

        function selectMode(mode, startLevel = 1) {
            gameMode = mode;
            startMenuLevel = startLevel;
            startMenuEl.style.display = 'none';
            levelSelectEl.style.display = 'none';
            canvas.style.display = 'block';
            initGame();
            startMusic();
        }

        function loadMaxUnlockedLevel() {
            return parseInt(localStorage.getItem('snakeMaxUnlockedLevel')) || 1;
        }

        function saveMaxUnlockedLevel(lvl) {
            localStorage.setItem('snakeMaxUnlockedLevel', lvl);
        }

        function unlockLevel(lvl) {
            const max = loadMaxUnlockedLevel();
            if (lvl > max) {
                saveMaxUnlockedLevel(lvl);
            }
        }

        function showLevelSelect() {
            startMenuEl.style.display = 'none';
            levelSelectEl.style.display = 'block';
            renderLevelGrid();
        }

        function renderLevelGrid() {
            levelGridEl.innerHTML = '';
            const maxUnlocked = loadMaxUnlockedLevel();
            const maxLevel = Math.max(30, maxUnlocked);
            for (let i = 1; i <= maxLevel; i++) {
                const btn = document.createElement('button');
                btn.className = 'level-btn';
                btn.textContent = i;
                if (i > maxUnlocked) {
                    btn.classList.add('locked');
                    btn.innerHTML = '🔒';
                    btn.title = '尚未解锁';
                } else {
                    btn.onclick = () => selectMode('level', i);
                    if (i < maxUnlocked) {
                        btn.classList.add('completed');
                    }
                }
                levelGridEl.appendChild(btn);
            }
        }

        function getObstacleCountForLevel(lvl) {
            return Math.min(120, lvl * 4 + (lvl >= 20 ? 30 : 0));
        }

        function getFoodsOnMapForLevel(lvl) {
            // 关卡越高，地图上同时存在的豆子越少，难度越高
            if (lvl < 5) return 3;
            if (lvl < 10) return 2;
            if (lvl < 20) return 2;
            return 1;
        }

        function getLevelTarget(lvl) {
            return 4 + Math.floor(lvl * 1.5);
        }

        function generateObstacles(count) {
            obstacles = [];
            const safeZone = [];
            // 保护出生区域，避免开局被围死
            for (let x = 7; x <= 13; x++) {
                for (let y = 8; y <= 12; y++) {
                    safeZone.push({ x: x * gridSize, y: y * gridSize });
                }
            }
            // 保护食物刷新区域附近（中心区域）
            for (let x = 12; x <= 18; x++) {
                for (let y = 12; y <= 18; y++) {
                    safeZone.push({ x: x * gridSize, y: y * gridSize });
                }
            }

            let attempts = 0;
            while (obstacles.length < count && attempts < count * 50) {
                attempts++;
                const candidate = {
                    x: Math.floor(Math.random() * tileCount) * gridSize,
                    y: Math.floor(Math.random() * tileCount) * gridSize
                };
                const inSafeZone = safeZone.some(p => p.x === candidate.x && p.y === candidate.y);
                const duplicate = obstacles.some(o => o.x === candidate.x && o.y === candidate.y);
                if (!inSafeZone && !duplicate) {
                    obstacles.push(candidate);
                }
            }
        }

        function isOccupied(x, y) {
            if (snake.some(s => s.x === x && s.y === y)) return true;
            if (obstacles.some(o => o.x === x && o.y === y)) return true;
            if (foods.some(f => f.x === x && f.y === y)) return true;
            return false;
        }

        function spawnFood() {
            let valid = false;
            let newFood = {};
            let attempts = 0;
            while (!valid && attempts < 200) {
                attempts++;
                newFood = {
                    x: Math.floor(Math.random() * tileCount) * gridSize,
                    y: Math.floor(Math.random() * tileCount) * gridSize
                };
                valid = !isOccupied(newFood.x, newFood.y);
            }
            if (valid) foods.push(newFood);
        }

        function spawnFoods(count) {
            for (let i = 0; i < count; i++) spawnFood();
        }

        function initGame() {
            snake = [
                { x: 10 * gridSize, y: 10 * gridSize },
                { x: 9 * gridSize, y: 10 * gridSize },
                { x: 8 * gridSize, y: 10 * gridSize }
            ];
            dx = gridSize;
            dy = 0;
            nextDx = gridSize;
            nextDy = 0;
            score = 0;
            scoreEl.textContent = formatScoreBoard();
            particles = [];
            foods = [];
            obstacles = [];
            level = gameMode === 'level' ? startMenuLevel : 1;
            levelEaten = 0;
            gameRunning = true;
            gamePaused = false;
            gameOverEl.style.display = 'none';

            if (gameMode === 'level') {
                levelTarget = getLevelTarget(level);
                generateObstacles(getObstacleCountForLevel(level));
                spawnFoods(getFoodsOnMapForLevel(level));
            } else {
                spawnFoods(1);
            }
        }

        function formatScoreBoard() {
            if (gameMode === 'level') {
                scoreLabelEl.textContent = '闯关:';
                return `关卡 ${level} | 豆子 ${levelEaten}/${levelTarget}`;
            }
            scoreLabelEl.textContent = '得分:';
            return `${score}`;
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x: x + gridSize / 2,
                    y: y + gridSize / 2,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 1.0,
                    color: color,
                    size: Math.random() * 4 + 2
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.025;
                p.size *= 0.96;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }

        function drawGrid() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
        }

        function drawSnake() {
            snake.forEach((segment, index) => {
                const segmentHue = (hue + index * 12) % 360;
                const color = `hsl(${segmentHue}, 100%, 60%)`;
                const glowColor = `hsl(${segmentHue}, 100%, 40%)`;

                ctx.save();
                ctx.fillStyle = color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = glowColor;

                const size = gridSize - 2;
                const radius = index === 0 ? 8 : 5;
                const x = segment.x + 1;
                const y = segment.y + 1;

                ctx.beginPath();
                ctx.roundRect(x, y, size, size, radius);
                ctx.fill();

                // 蛇眼
                if (index === 0) {
                    ctx.fillStyle = '#fff';
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = '#fff';
                    let eyeOffset = 5;
                    let eye1X = x + size / 2;
                    let eye1Y = y + size / 2;
                    let eye2X = x + size / 2;
                    let eye2Y = y + size / 2;

                    if (dx > 0) { eye1X += eyeOffset; eye2X += eyeOffset; eye1Y -= 4; eye2Y += 4; }
                    else if (dx < 0) { eye1X -= eyeOffset; eye2X -= eyeOffset; eye1Y -= 4; eye2Y += 4; }
                    else if (dy > 0) { eye1Y += eyeOffset; eye2Y += eyeOffset; eye1X -= 4; eye2X += 4; }
                    else { eye1Y -= eyeOffset; eye2Y -= eyeOffset; eye1X -= 4; eye2X += 4; }

                    ctx.beginPath();
                    ctx.arc(eye1X, eye1Y, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(eye2X, eye2Y, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            });
        }

        function drawFood() {
            foodPulse += 0.08;
            const pulse = Math.sin(foodPulse) * 3;
            const foodHue = (hue + 180) % 360;

            foods.forEach((food, index) => {
                const color = `hsl(${(foodHue + index * 40) % 360}, 100%, 60%)`;

                ctx.save();
                ctx.fillStyle = color;
                ctx.shadowBlur = 25 + pulse;
                ctx.shadowColor = color;

                const cx = food.x + gridSize / 2;
                const cy = food.y + gridSize / 2;
                const radius = (gridSize / 2 - 2) + pulse / 2;

                ctx.beginPath();
                ctx.arc(cx, cy, Math.max(2, radius), 0, Math.PI * 2);
                ctx.fill();

                // 食物光晕核心
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(cx, cy, 4, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            });
        }

        function drawObstacles() {
            obstacles.forEach((obs) => {
                const x = obs.x + 1;
                const y = obs.y + 1;
                const size = gridSize - 2;

                ctx.save();
                // 木头底色
                ctx.fillStyle = '#8B5A2B';
                ctx.shadowBlur = 6;
                ctx.shadowColor = '#5C3A1E';
                ctx.beginPath();
                ctx.roundRect(x, y, size, size, 3);
                ctx.fill();

                // 木纹线条
                ctx.strokeStyle = '#6B4226';
                ctx.lineWidth = 1.2;
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.moveTo(x + 3, y + 4);
                ctx.lineTo(x + size - 3, y + 4);
                ctx.moveTo(x + 2, y + 9);
                ctx.lineTo(x + size - 2, y + 9);
                ctx.moveTo(x + 4, y + 14);
                ctx.lineTo(x + size - 4, y + 14);
                ctx.stroke();

                // 木结
                ctx.fillStyle = '#5C3A1E';
                ctx.beginPath();
                ctx.ellipse(x + size * 0.7, y + size * 0.55, 2, 1.5, 0, 0, Math.PI * 2);
                ctx.fill();

                // 边框高光
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.lineWidth = 0.8;
                ctx.beginPath();
                ctx.roundRect(x + 0.5, y + 0.5, size - 1, size - 1, 3);
                ctx.stroke();

                ctx.restore();
            });
        }

        function update() {
            if (!gameRunning || gamePaused) return;

            dx = nextDx;
            dy = nextDy;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // 撞墙、撞自己或撞障碍物都会死
            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
                gameOver();
                return;
            }
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }
            if (obstacles.some(o => o.x === head.x && o.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 吃食物
            const eatenIndex = foods.findIndex(f => f.x === head.x && f.y === head.y);
            if (eatenIndex !== -1) {
                const eatenFood = foods[eatenIndex];
                foods.splice(eatenIndex, 1);
                score += 10 + (gameMode === 'level' ? level : 0);
                levelEaten++;
                createParticles(eatenFood.x, eatenFood.y, `hsl(${(hue + 180) % 360}, 100%, 60%)`);
                playEatSound();

                if (gameMode === 'level') {
                    if (levelEaten >= levelTarget) {
                        levelUp();
                    } else {
                        const missing = getFoodsOnMapForLevel(level) - foods.length;
                        if (missing > 0) spawnFoods(missing);
                    }
                } else {
                    const missing = 1 - foods.length;
                    if (missing > 0) spawnFoods(missing);
                }
                scoreEl.textContent = formatScoreBoard();
            } else {
                snake.pop();
            }
        }

        function levelUp() {
            score += level * 50; // 过关奖励
            unlockLevel(level + 1); // 解锁下一关
            level++;
            startMenuLevel = level; // 记录当前进度，复活从当前关开始
            levelEaten = 0;
            generateObstacles(getObstacleCountForLevel(level));
            levelTarget = getLevelTarget(level);
            foods = [];
            spawnFoods(getFoodsOnMapForLevel(level));
            scoreEl.textContent = formatScoreBoard();

            // 过关音效
            playLevelUpSound();

            // 显示过关提示（用粒子爆发代替弹窗，不打断节奏）
            for (let i = 0; i < 30; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    vx: (Math.random() - 0.5) * 12,
                    vy: (Math.random() - 0.5) * 12,
                    life: 1.5,
                    color: `hsl(${Math.random() * 60 + 40}, 100%, 60%)`,
                    size: Math.random() * 5 + 3
                });
            }

            // 关卡越高速度越快
            if (gameLoopId) clearInterval(gameLoopId);
            gameLoopId = setInterval(gameLoop, Math.max(45, 100 - level * 2));
        }

        function playLevelUpSound() {
            if (!audioCtx) return;
            playTone(523, 'sine', 0.1);
            setTimeout(() => playTone(659, 'sine', 0.1), 100);
            setTimeout(() => playTone(783, 'sine', 0.1), 200);
            setTimeout(() => playTone(1046, 'sine', 0.3), 300);
        }

        function gameOver() {
            gameRunning = false;
            stopMusic();
            playGameOverSound();

            if (gameMode === 'level') {
                finalScoreEl.innerHTML = `到达关卡 ${level}<br>得分 ${score}`;
            } else {
                finalScoreEl.textContent = score;
            }
            gameOverEl.style.display = 'block';

            const board = addScoreToLeaderboard(score);
            const isRecord = isNewRecord(score);

            if (isRecord) {
                recordNoticeEl.style.display = 'block';
                localStorage.setItem('snakeHighScore', score);
                highScoreEl.textContent = score;
            } else {
                recordNoticeEl.style.display = 'none';
            }

            renderLeaderboard(board, score);
        }

        function backToMenu() {
            gameOverEl.style.display = 'none';
            levelSelectEl.style.display = 'none';
            startMenuEl.style.display = 'block';
            canvas.style.display = 'none';
            gameMode = null;
            stopMusic();
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function restartGame() {
            playRespawnSound();
            initGame();
            startMusic();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid();
            drawObstacles();
            drawFood();
            drawSnake();
            drawParticles();
        }

        function gameLoop() {
            update();
            updateParticles();
            draw();
            hue = (hue + 1) % 360;
        }

        document.addEventListener('keydown', (e) => {
            initAudio();
            startMusic();
            const key = e.key.toLowerCase();
            if (!gameRunning && key !== ' ' && key !== 'r') return;

            switch(key) {
                case 'arrowup':
                case 'w':
                    if (dy === 0) { nextDx = 0; nextDy = -gridSize; }
                    break;
                case 'arrowdown':
                case 's':
                    if (dy === 0) { nextDx = 0; nextDy = gridSize; }
                    break;
                case 'arrowleft':
                case 'a':
                    if (dx === 0) { nextDx = -gridSize; nextDy = 0; }
                    break;
                case 'arrowright':
                case 'd':
                    if (dx === 0) { nextDx = gridSize; nextDy = 0; }
                    break;
                case ' ':
                    if (gameRunning) {
                        gamePaused = !gamePaused;
                        if (gamePaused) stopMusic(); else startMusic();
                    }
                    break;
                case 'r':
                    restartGame();
                    break;
            }
        });

        // 触屏滑动控制
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            initAudio();
            startMusic();
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
            touchStartTime = Date.now();
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (touchStartX === 0 && touchStartY === 0) return;
            const touch = e.changedTouches[0];
            const deltaX = touch.clientX - touchStartX;
            const deltaY = touch.clientY - touchStartY;
            const elapsed = Date.now() - touchStartTime;

            // 快速点击（时间短、位移小）也可作为暂停/继续
            if (Math.abs(deltaX) < 10 && Math.abs(deltaY) < 10 && elapsed < 300) {
                if (gameRunning) {
                    gamePaused = !gamePaused;
                    if (gamePaused) stopMusic(); else startMusic();
                } else {
                    restartGame();
                }
                return;
            }

            handleSwipe(deltaX, deltaY);
            touchStartX = 0;
            touchStartY = 0;
        }, { passive: false });

        canvas.style.display = 'none';
        gameLoopId = setInterval(gameLoop, 100);
    </script>
</body>
</html>
